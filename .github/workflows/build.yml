name: Build Windows and HTML5

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install Libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib install hxWidgets --quiet
          haxelib install haxeui-core --quiet
          haxelib install haxeui-hxwidgets --quiet
          haxelib install haxeui-html5 --quiet

      # Windows専用：ネイティブビルド
      - name: Build Windows (C++)
        if: matrix.os == 'windows-latest'
        run: |
          haxelib run hxWidgets setup
          haxe build_windows.hxml

      # Ubuntu専用：HTML5ビルド
      - name: Build HTML5
        if: matrix.os == 'ubuntu-latest'
        run: haxe build_html5.hxml

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.os }}
          path: export/
