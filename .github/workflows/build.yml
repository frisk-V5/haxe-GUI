name: Cross-Platform Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 1つがコケても他を止めない
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsecret-1-dev libgc-dev

      - name: Install Haxe Libraries
        # 実行権限などの問題を避けるため、1つずつ確実に
        run: |
          haxelib install hxcpp --quiet
          haxelib install hxWidgets --quiet
          haxelib install haxeui-core --quiet
          haxelib install haxeui-hxwidgets --quiet

      - name: Build App
        run: haxe build.hxml

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ matrix.os }}
          path: export/cpp/
