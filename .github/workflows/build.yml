name: Cross-Platform Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-13, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      # --- 依存GUIライブラリのインストール ---
      - name: Install Dependencies
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            choco install wxwidgets-msvc -y
          elif [ "${{ matrix.os }}" = "macos-13" ]; then
            brew install wxwidgets
          else
            sudo apt-get update
            sudo apt-get install -y libgtk-3-dev libsecret-1-dev libgc-dev libwxgtk3.2-dev
          fi
        shell: bash

      # --- Haxeライブラリのインストールとセットアップ ---
      - name: Install Haxe Libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib install hxWidgets --quiet
          haxelib install haxeui-core --quiet
          haxelib install haxeui-hxwidgets --quiet
          # WindowsでwxWidgetsのパスを自動検出させる
          haxelib run hxWidgets setup

      - name: Build App
        # Windowsのヘッダー不一致を避けるため静的リンクフラグを強制
        run: haxe build.hxml -D wxWidgets-static

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ matrix.os }}
          path: export/cpp/
