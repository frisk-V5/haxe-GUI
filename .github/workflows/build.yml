name: Ultimate Cross-Platform Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 3OSすべてをターゲットにする
        os: [windows-latest, macos-13, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      # --- 各OSごとの依存ライブラリ (wxWidgets用) ---
      - name: Install Native Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install wxwidgets-msvc -y

      - name: Install Native Dependencies (macOS)
        if: matrix.os == 'macos-13'
        run: brew install wxwidgets

      - name: Install Native Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsecret-1-dev libgc-dev libwxgtk3.2-dev

      # --- 全プラットフォーム共通のHaxeライブラリ ---
      - name: Install Haxe Libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib install hxWidgets --quiet
          haxelib install haxeui-core --quiet
          haxelib install haxeui-hxwidgets --quiet
          haxelib install haxeui-html5 --quiet

      # --- 1. ネイティブアプリのビルド (3OS分) ---
      - name: Build Native App (C++)
        run: haxe build.hxml -D wxWidgets-static

      # --- 2. HTML5版のビルド (どのOSのジョブでも1回通ればOK) ---
      # UbuntuのついでにHTML5もビルドさせる設定
      - name: Build HTML5 version
        if: matrix.os == 'ubuntu-latest'
        run: |
          haxe -cp src -main Main -lib haxeui-core -lib haxeui-html5 -js export/html5/main.js -D html5

      # --- 3. 成果物の保存 (ビルド成功後にダウンロード可能にする) ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            export/cpp/
            export/html5/
