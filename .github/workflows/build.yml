name: Build EXE and HTML5

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install Libraries
        # 必要なライブラリだけを確実にインストール
        run: |
          haxelib install hxcpp --quiet
          haxelib install haxeui-core --quiet
          haxelib install haxeui-html5 --quiet
          haxelib install haxeui-hxwidgets --quiet
          haxelib install hxWidgets --quiet

      - name: Build HTML5
        # HTML5版の書き出し
        run: haxe -cp src -main Main -lib haxeui-core -lib haxeui-html5 -D html5 -js export/html5/main.js

      - name: Build Windows EXE
        # Windowsネイティブ(.exe)の書き出し
        # 依存関係で止まらないよう、フラグを明示
        run: haxe -cp src -main Main -lib haxeui-core -lib haxeui-hxwidgets -lib hxWidgets -D hxwidgets -cpp export/windows -D wxWidgets-static

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Output
          path: export/
