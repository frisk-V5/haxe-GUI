name: Cross-Platform Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOSは確実に動く13 (Intel) を指定してエラーを回避
        os: [windows-latest, macos-13, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      # --- 各OSごとのGUIライブラリ(wxWidgets)インストール ---
      
      - name: Install wxWidgets (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install wxwidgets-msvc --version=3.1.5 -y

      - name: Install wxWidgets (macOS)
        if: matrix.os == 'macos-13'
        run: brew install wxwidgets

      - name: Install wxWidgets (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsecret-1-dev libgc-dev libwxgtk3.2-dev

      # --- Haxeライブラリの準備 ---

      - name: Install Haxe Libraries
        run: |
          haxelib install hxcpp --quiet
          haxelib install hxWidgets --quiet
          haxelib install haxeui-core --quiet
          haxelib install haxeui-hxwidgets --quiet

      - name: Build App
        # Windowsの場合のみ、wxWidgetsのパスを通す設定が必要な場合がありますが、まずはこれで実行
        run: haxe build.hxml

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ matrix.os }}
          path: export/cpp/
